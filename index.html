
<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東莞市琢石橡塑製品有限公司 | 專業橡塑助劑研發與生產</title>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 質感深沉工業灰色盤 */
            --bg: oklch(98% 0.003 30);        /* 帶極微暖意的石灰白底色 */
            --surface: oklch(100% 0 0);
            --fg: oklch(15% 0.01 30);         /* 深石墨灰，避免純黑的生硬 */
            --muted: oklch(48% 0.01 30);       /* 啞光灰 */
            --border: oklch(92% 0.005 30);
            
            /* 專業化學/高分子象徵色：琥珀金 / 鐵鏽橙 */
            --accent: oklch(62% 0.16 48);      /* 溫潤高質感赤土橙 (Terracotta) */
            --accent-soft: oklch(96% 0.02 48); /* 淺色半透明底色 */

            --font-display: 'Inter', -apple-system, system-ui, sans-serif;
            --font-body: 'Inter', -apple-system, system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;

            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 24px;
            
            --container-width: 1280px;
            --header-height: 88px;
            --header-shrunk: 64px;
            --section-gap: 160px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background-color: var(--bg); color: var(--fg); line-height: 1.8; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-left { opacity: 0; transform: translateX(-40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-right { opacity: 0; transform: translateX(40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-left.visible, .reveal-right.visible { opacity: 1; transform: translateX(0); }
        
        h1, h2, h3, h4 { font-family: var(--font-display); letter-spacing: -0.025em; font-weight: 600; }
        .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
        .container { max-width: var(--container-width); margin: 0 auto; padding: 0 60px; }

        header { 
            height: var(--header-height); 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(32px); 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        header.shrunk { height: var(--header-shrunk); background: rgba(255, 255, 255, 0.98); box-shadow: 0 15px 40px rgba(0,0,0,0.04); }

        nav { display: flex; justify-content: space-between; align-items: center; height: 100%; }
        .logo { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 16px; transition: all 0.4s ease; }
        .logo-img { height: 40px; width: auto; display: block; border-radius: 2px; }
        .brand-name { display: flex; flex-direction: column; }
        .brand-name span:last-child { font-size: 9px; color: var(--muted); letter-spacing: 0.05em; font-weight: 500; text-transform: uppercase; margin-top: 2px; }
        
        .nav-links { display: flex; gap: 8px; font-size: 15px; font-weight: 500; height: 100%; align-items: center; }
        .nav-link { color: var(--muted); cursor: pointer; transition: 0.3s; padding: 10px 18px; border-radius: var(--radius-sm); position: relative; }
        .nav-link:hover { color: var(--fg); background: var(--bg); }
        .nav-link.active { color: var(--accent); font-weight: 600; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -8px; left: 18px; right: 18px; height: 3px; background: var(--accent); animation: slideIn 0.5s ease; }

        @keyframes slideIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }

        main { padding: 60px 0 120px; }

        .badge { display: inline-block; padding: 6px 16px; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); font-size: 12px; font-weight: 700; border-radius: 4px; text-transform: uppercase; margin-bottom: 32px; letter-spacing: 0.1em; }
        .button { display: inline-flex; align-items: center; padding: 14px 40px; background: var(--fg); color: white; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: 0.4s; }
        .button:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: var(--radius-md); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }

        .swd-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-7 { grid-column: span 7; }
        .col-5 { grid-column: span 5; }

        .phi-row { display: grid; grid-template-columns: 1fr 1.2fr; gap: 64px; align-items: center; background: var(--surface); border: none; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 80px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03); }
        .phi-row.flipped { grid-template-columns: 1.2fr 1fr; }
        .phi-img-side { width: 100%; height: 400px; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 40px; }
        .phi-img-side img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .phi-text-side { padding: 60px; }
        .phi-text-side h3 { font-size: 32px; color: var(--accent); margin-bottom: 24px; border-bottom: 3px solid var(--accent-soft); padding-bottom: 8px; display: inline-block; }
        .phi-tagline { font-size: 20px; font-weight: 700; color: var(--fg); margin-bottom: 32px; line-height: 1.4; }
        .phi-list { list-style: none; }
        .phi-list li { margin-bottom: 16px; padding-left: 28px; position: relative; font-size: 15px; color: var(--muted); }
        .phi-list li::before { content: '•'; position: absolute; left: 0; color: var(--accent); font-size: 24px; top: -4px; }
        .phi-list b { color: var(--fg); font-weight: 600; }

        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; margin-top: 48px; }
        .lab-item { background: white; border: 1px solid var(--border); padding: 24px; text-align: center; border-radius: var(--radius-md); transition: 0.3s; }
        .lab-item:hover { transform: translateY(-5px); border-color: var(--accent); }
        .lab-img-box { width: 100%; aspect-ratio: 4/3; background: var(--bg); margin-bottom: 20px; overflow: hidden; display: flex; align-items: flex-start; justify-content: center; border-radius: 4px; }
        .lab-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .lab-item.needs-crop .lab-img-box img { height: 120%; object-position: center top; }

        .factory-frame { position: relative; width: 100%; max-height: 380px; border-radius: var(--radius-md); overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .factory-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 1.2s ease; }

        footer { background: var(--surface); border-top: 1px solid var(--border); padding: 100px 0 60px; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1.5fr; gap: 80px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 48px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .tab { padding: 10px 24px; background: var(--bg); border: 1px solid var(--border); font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 4px; color: var(--muted); transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .table-container { width: 100%; overflow-x: auto; background: white; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg); text-align: left; padding: 16px 24px; font-size: 14px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 14px; }

        @media (max-width: 1024px) {
            .phi-row, .phi-row.flipped { grid-template-columns: 1fr; }
            .phi-img-side { height: 300px; }
        }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .container { padding: 0 30px; }
            .footer-grid { grid-template-columns: 1fr; gap: 60px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const useReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return ref;
        };

        const App = () => {
            const getHashPage = () => {
                const hash = window.location.hash.replace('#', '');
                return ['home', 'about', 'products', 'product-detail', 'support', 'contact'].includes(hash) ? hash : 'home';
            };

            const [currentPage, setCurrentPage] = useState(getHashPage());
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 40);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const handleHashChange = () => {
                    setCurrentPage(getHashPage());
                    window.scrollTo({ top: 0, behavior: 'instant' });
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const navigate = (p) => {
                const nextHash = p === 'home' ? '' : p;
                if (window.location.hash === `#${nextHash}` || (window.location.hash === '' && nextHash === '')) {
                    window.scrollTo({ top: 0, behavior: 'instant' });
                } else {
                    window.location.hash = nextHash;
                }
            };

            const COMPANY_EN = "ENGRAVE STONE RUBBER & PLASTIC PRODUCT CO., LTD.";

            return (
                <div>
                    <header className={scrolled ? 'shrunk' : ''}>
                        <div className="container">
                            <nav>
                                <div className="logo" onClick={() => navigate('home')} style={{cursor:'pointer'}}>
                                    <img src="mpjk9dcm-琢石logo.jpg" className="logo-img" alt="Logo" />
                                    <div className="brand-name">
                                        <span>東莞市琢石橡塑製品有限公司</span>
                                        <span>{COMPANY_EN}</span>
                                    </div>
                                </div>
                                <div className="nav-links">
                                    {['home', 'about', 'products', 'support', 'contact'].map(p => (
                                        <div 
                                            key={p} 
                                            className={`nav-link ${currentPage === p ? 'active' : ''}`}
                                            onClick={() => navigate(p)}
                                        >
                                            {p === 'home' && '首頁'}
                                            {p === 'about' && '關於我們'}
                                            {p === 'products' && '產品目錄'}
                                            {p === 'support' && '技術規格'}
                                            {p === 'contact' && '聯絡我們'}
                                        </div>
                                    ))}
                                </div>
                                <button className="button" style={{padding: '10px 24px', fontSize: '14px'}} onClick={() => navigate('contact')}>詢問報價</button>
                            </nav>
                        </div>
                    </header>

                    <main>
                        <div key={currentPage} className="fade-in">
                            {currentPage === 'home' && <HomePage onNavigate={navigate} companyEn={COMPANY_EN} />}
                            {currentPage === 'about' && <AboutPage companyEn={COMPANY_EN} />}
                            {currentPage === 'products' && <ProductsPage onNavigate={navigate} />}
                            {currentPage === 'product-detail' && <ProductDetailPage onNavigate={navigate} />}
                            {currentPage === 'support' && <SupportPage />}
                            {currentPage === 'contact' && <ContactPage companyEn={COMPANY_EN} />}
                        </div>
                    </main>

                    <footer className="reveal" ref={useReveal()}>
                        <div className="container">
                            <div className="footer-grid">
                                <div>
                                    <div className="logo" style={{marginBottom:'32px'}}>
                                        <img src="mpjk9dcm-琢石logo.jpg" className="logo-img" style={{height:'36px'}} alt="Logo" />
                                        <div className="brand-name" style={{marginLeft: '12px'}}>
                                            <span style={{fontSize: '18px'}}>東莞市琢石橡塑製品有限公司</span>
                                            <span style={{fontSize: '8px'}}>{COMPANY_EN}</span>
                                        </div>
                                    </div>
                                    <p style={{color:'var(--muted)', maxWidth:'450px', fontSize: '14px'}}>
                                        專業從事橡塑材料添加助劑研發與生產，通過精確分子級檢測與創新技術，為全球高端製造業提供穩定可靠的工業化學解決方案。
                                    </p>
                                </div>
                                <div className="footer-links">
                                    <h4 style={{fontSize: '13px', marginBottom: '24px', letterSpacing: '0.05em'}}>PRODUCT LINE</h4>
                                    <ul className="mono" style={{fontSize: '12px', lineHeight: 2.5}}>
                                        <li>發泡劑系列 FOAMING</li>
                                        <li>耐磨劑系列 ANTI-ABRASION</li>
                                        <li>抗氧化系列 ANTIOXIDANT</li>
                                        <li>功能助劑系 SPECIALTY</li>
                                    </ul>
                                </div>
                                <div className="footer-links">
                                    <h4 style={{fontSize: '13px', marginBottom: '24px', letterSpacing: '0.05em'}}>GLOBAL NETWORK</h4>
                                    <ul style={{fontSize: '13px', lineHeight: 2.2}}>
                                        <li><strong>台灣辦事處：</strong>佶暘新材料科技有限公司</li>
                                        <li style={{color:'var(--muted)'}}>臺南市鹽水區歡雅里尾寮10之17號1樓</li>
                                        <li style={{marginTop:'12px'}}><strong>東莞生產基地：</strong>0769-83792005</li>
                                        <li style={{color:'var(--muted)'}}>東莞市沙田鎮齊沙村齊沙一路1號</li>
                                    </ul>
                                </div>
                            </div>
                            <div style={{marginTop:'100px', paddingTop:'40px', borderTop:'1px solid var(--border)', fontSize:'11px', color:'var(--muted)', display:'flex', justifyContent:'space-between', alignItems: 'center'}}>
                                <span>© 2026 ENGRAVE STONE RUBBER & PLASTIC PRODUCT CO., LTD. 版權所有</span>
                                <div style={{display:'flex', gap:'32px'}}>
                                    <span>納稅信用 A 級企業</span>
                                    <span>法律顧問：李憲璋律師團隊</span>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const HomePage = ({ onNavigate, companyEn }) => {
            const r1 = useReveal();
            const r2 = useReveal();
            const r3 = useReveal();
            return (
                <div className="container">
                    <section className="reveal" ref={r1} style={{padding:'80px 0', textAlign: 'center'}}>
                        <h1 style={{fontSize:'72px', lineHeight:1.1, marginBottom:'40px'}}>
                            賦能橡塑性能<br /><span style={{color:'var(--accent)'}}>分子級精密助劑的創新研發與製造</span>
                        </h1>
                        <p style={{fontSize:'20px', color:'var(--muted)', maxWidth:'850px', margin:'0 auto 64px', lineHeight: 1.6}}>
                            {companyEn}<br />集研發、生產與貿易代理於一體，致力於為橡膠、塑膠及 EVA 發泡產業提供分子級高性能化學助劑。
                        </p>
                        <div style={{display:'flex', gap:'24px', justifyContent: 'center'}}>
                            <button className="button" onClick={() => onNavigate('products')}>瀏覽產品中心</button>
                            <button className="button" style={{background:'var(--bg)', color:'var(--fg)', border:'1px solid var(--border)'}} onClick={() => onNavigate('support')}>技術手冊檢索</button>
                        </div>
                    </section>

                    <section className="reveal" ref={r2} style={{marginTop: '40px'}}>
                        <div style={{textAlign: 'center', marginBottom: '60px'}}><div className="badge">CORE VALUES / 發展與經營理念</div></div>
                        <div className="phi-row">
                            <div className="phi-img-side"><img src="mpqidxab-截圖-2026-05-29-下午1.24.17.png" alt="發展理念" /></div>
                            <div className="phi-text-side">
                                <h3>發展理念</h3>
                                <div className="phi-tagline">聚焦「創新驅動、品質筑基、綠色共贏」</div>
                                <ul className="phi-list">
                                    <li>以<b>技術創新</b>突破行業瓶頸，持續優化分子結構，引領產品高效迭代。</li>
                                    <li>以<b>全流程高標準</b>管控制造環節，精確把控每一批次產品性能的穩定。</li>
                                    <li>以<b>環保標準</b>研發綠色化學助劑，實現企業、環境與行業的永續共贏。</li>
                                </ul>
                            </div>
                        </div>
                        <div className="phi-row flipped">
                            <div className="phi-text-side">
                                <h3>經營理念</h3>
                                <div className="phi-tagline">落實「客戶至上、誠信為本、協作創效」</div>
                                <ul className="phi-list">
                                    <li><b>客戶至上：</b>深入洞察工業需求，提供精確的定制化方案與技術指導。</li>
                                    <li><b>誠信為本：</b>堅持全環節守誠，保證品質真實可靠，築就深厚互信。</li>
                                    <li><b>協作創效：</b>整合兩岸優勢，與合作夥伴共創高價值的產業發展空間。</li>
                                </ul>
                            </div>
                            <div className="phi-img-side"><img src="mpqidxau-截圖-2026-05-29-下午1.24.24.png" alt="經營理念" /></div>
                        </div>
                    </section>

                    <div className="swd-grid reveal" ref={r3} style={{marginTop: '100px'}}>
                        <div className="card col-4">
                            <div className="mono" style={{color: 'var(--accent)', fontSize: '13px', marginBottom: '24px'}}>01 / R&D CENTER</div>
                            <h4>數據驅動研發</h4>
                            <p style={{fontSize: '14px', color: 'var(--muted)', marginTop: '12px'}}>配備 13 項精密實驗室儀器，對原料穩定性與分散性進行分子級監控。</p>
                        </div>
                        <div className="card col-4">
                            <div className="mono" style={{color: 'var(--accent)', fontSize: '13px', marginBottom: '24px'}}>02 / COMPLIANCE</div>
                            <h4>全球環保標準</h4>
                            <p style={{fontSize: '15px', color: 'var(--muted)', marginTop: '12px'}}>遵循 REACH 與 ROHS 規範，確保在高端製造中的綠色合規。</p>
                        </div>
                        <div className="card col-4">
                            <div className="mono" style={{color: 'var(--accent)', fontSize: '13px', marginBottom: '24px'}}>03 / NETWORK</div>
                            <h4>跨區協作服務</h4>
                            <p style={{fontSize: '15px', color: 'var(--muted)', marginTop: '12px'}}>聯動台灣管理核心與東莞製造基地，提供穩定的物流供應。</p>
                        </div>
                    </div>
                </div>
            );
        };

        const AboutPage = ({ companyEn }) => {
            const r1 = useReveal();
            const r2 = useReveal();
            const rFactory = useReveal();

            const equipments = [
                { name: 'DIN耐磨耗測試機', img: 'mpqhm7sk-DIN耐磨耗測試機.png', crop: true },
                { name: '無轉子硫化儀', img: 'mpqhltbj-無轉子硫化儀.png' },
                { name: '臥式低溫耐寒試驗機', img: 'mpqhltbh-臥式低溫耐寒試驗機.png', crop: true },
                { name: '色差分光儀', img: 'mpqhltbg-色差分光儀.png', crop: true },
                { name: '平板硫化機', img: 'mpqhltbc-平板硫化機.png' },
                { name: '精密注塑機', img: 'mpqho491-精密注塑機.png' },
                { name: '實驗用吹袋成型機', img: 'mpqho48v-實驗用吹袋成型機.png' },
                { name: '熔融指數儀', img: 'mpqhm7si-熔融指數儀.png' }
            ];

            return (
                <div className="fade-in">
                    <div className="container" style={{marginBottom: 'var(--section-gap)'}}>
                        <section className="reveal" ref={r1}>
                            <div className="badge">ABOUT US / 企業簡介</div>
                            <div className="swd-grid" style={{alignItems: 'start'}}>
                                <div className="col-7">
